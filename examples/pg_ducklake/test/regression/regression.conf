# Configuration

shared_preload_libraries = 'pg_ducklake'
log_temp_files = -1
# Parallel workers disabled to work around a Mac-only hang.
#
# When DuckLake reads inlined data, it issues a query through DuckDB that
# resolves back to a PG heap table via libpgddb's PostgresTableReader. On
# macOS, this recursive "DuckDB-execute -> PostgresTableReader -> PG
# parallel workers" path hangs in ExecParallelFinish waiting for workers
# that never report back. Likely a forking/dyld interaction specific to
# Apple's runtime -- pg_duckdb upstream observed similar behavior. Linux
# is unaffected.
#
# Workaround for the regression suite: disable PG parallel workers
# entirely. Real deployments on Mac should keep max_parallel_workers = 0
# until this is fully diagnosed; Linux deployments are unaffected.
max_parallel_workers_per_gather = 0
max_parallel_workers = 0
ducklake.maintenance_enabled = false
